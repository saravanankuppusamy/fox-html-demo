<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Basics Demo</title>
</head>
<body>
  <h1>Travel Blog</h1>
  <h2>Top Destinations</h2>
  <h3>United States</h3>

  <p>This is a paragraph about travel planning.</p>
  <p>You can use <strong>strong</strong> for important text and <em>em</em> for emphasis.</p>

  <p>Line 1<br>Line 2<br>Line 3</p>

  <hr>

  <p><mark>Special offer:</mark> Book today and save more.</p>
  <p>Water formula: H<sub>2</sub>O</p>
  <p>2<sup>3</sup> = 8</p>

</body>
</html>

<!-- Tags covered -->

<!-- h1 to h6, p, strong, em, br, hr, mark, sub, sup -->
