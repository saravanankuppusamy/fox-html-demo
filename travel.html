<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML5 Basics Demo</title>
</head>

<body>
  <h1>Travel Resources</h1>

  <a href="https://www.travelocity.com/" target="_blank">Visit Travel Booking Site</a>

  <h2>Popular Destinations</h2>
  <ul>
    <li>Paris</li>
    <li>Zurich</li>
    <li>Singapore</li>
  </ul>

  <h2>Booking Steps</h2>
  <ol>
    <li>Select destination</li>
    <li>Choose dates</li>
    <li>Confirm booking</li>
  </ol>

  <h2>Destination Image</h2>
  <img src="images/paris.jpeg"  alt="Featured Travel destination Paris">
</body>

</html>

<!-- Tags covered -->

<!-- a, ul, ol, li, img -->

<!-- href for link -->
<!-- target="_blank" opens in new tab -->
<!-- src for image path -->
<!-- alt is important for accessibility -->
